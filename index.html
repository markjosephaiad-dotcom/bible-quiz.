<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة اجتماع الخدام | أبي سيفين</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=9E66FmsY"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --coptic-maroon: #580F0F; --coptic-gold: #C5A059; --bg: #FAF8F5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .page { display: none; } .active { display: block; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--coptic-maroon); color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .reset-btn { background: #b71c1c; font-size: 11px; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="page active">
        <h2>تسجيل دخول الخادم</h2>
        <select id="servantSelect"><option value="">اختر اسمك...</option><option value="ماركو مجدي">ماركو مجدي</option></select>
        <input type="number" id="pass" placeholder="الكود السري">
        <button onclick="login()">دخول</button>
        <button style="background:#555;" onclick="switchPage('adminPage')">لوحة التحكم</button>
    </div>

    <div id="adminPage" class="page">
        <h2>لوحة التحكم</h2>
        <table>
            <thead><tr><th>الاسم</th><th>الدرجة</th><th>إجراء</th></tr></thead>
            <tbody id="adminBody"></tbody>
        </table>
        <button style="background:#333;" onclick="switchPage('loginPage')">خروج</button>
    </div>
</div>

<script>
    const QUIZ_KEY = "scores_" + new Date().toLocaleDateString();

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'adminPage') renderAdmin();
    }

    function renderAdmin() {
        let scores = JSON.parse(localStorage.getItem(QUIZ_KEY)) || {};
        let html = "";
        for (let name in scores) {
            html += `<tr><td>${name}</td><td>${scores[name]}</td>
            <td><button class="reset-btn" onclick="resetServant('${name}')">🔄 مسح</button></td></tr>`;
        }
        document.getElementById('adminBody').innerHTML = html;
    }

    function resetServant(name) {
        if(confirm("مسح امتحان " + name + " تماماً؟")) {
            let scores = JSON.parse(localStorage.getItem(QUIZ_KEY)) || {};
            delete scores[name];
            localStorage.setItem(QUIZ_KEY, JSON.stringify(scores));
            renderAdmin();
        }
    }

    function login() {
        // منطق الدخول
        alert("تم الدخول!");
        switchPage('quizPage');
    }

    // نطق فوري
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-EG';
            window.speechSynthesis.speak(msg);
        } else {
            responsiveVoice.speak(text, "Arabic Male");
        }
    }
</script>

</body>
</html>
